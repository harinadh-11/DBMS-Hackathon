# ============================================================
# Academic Course Planner - Spring Boot Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=academic-course-planner

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/academic_planner
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=AcademicCoursePlannerSecretKey2024SuperSecureAndLongEnoughForHS256
jwt.expiration=86400000

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.acp=DEBUG
logging.level.org.springframework.security=DEBUG
